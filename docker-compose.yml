x-signalforge-env: &signalforge-env
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  GPT_AGENT_ENABLED: ${GPT_AGENT_ENABLED:-false}
  MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/signalforge}
  LINKEDIN_COOKIE: ${LINKEDIN_COOKIE:-}
  X_API_KEY: ${X_API_KEY:-}
  APIFY_TOKEN: ${APIFY_TOKEN:-}
  SERPAPI_KEY: ${SERPAPI_KEY:-}
  SIGNALFORGE_ENV: ${SIGNALFORGE_ENV:-local}
  VAULT_PATH: /vault
  PYTHONPATH: /app
  # Social Creative Engine v2 — ComfyUI integration (disabled by default)
  COMFYUI_ENABLED: ${COMFYUI_ENABLED:-false}
  COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://comfyui:8188}
  COMFYUI_WORKFLOW_PATH: ${COMFYUI_WORKFLOW_PATH:-}
  # Social Creative Engine v5.5 — FFmpeg render pipeline (enabled by default)
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  FFMPEG_ENABLED: ${FFMPEG_ENABLED:-true}
  FFMPEG_OUTPUT_DIR: ${FFMPEG_OUTPUT_DIR:-/tmp/signalforge_renders}
  # E2E testing — lower snippet score threshold (restore to 6 after E2E)
  SNIPPET_SCORE_THRESHOLD: ${SNIPPET_SCORE_THRESHOLD:-6}
  # v10.4 — Media Ingestion Layer
  YTDLP_ENABLED: ${YTDLP_ENABLED:-false}
  YTDLP_OUTPUT_DIR: ${YTDLP_OUTPUT_DIR:-/tmp/signalforge_downloads}
  YTDLP_MAX_DURATION_SECONDS: ${YTDLP_MAX_DURATION_SECONDS:-7200}
  YTDLP_ALLOWED_DOMAINS: ${YTDLP_ALLOWED_DOMAINS:-youtube.com,youtu.be}

services:
  mongo:
    image: mongo:8.2.7
    container_name: signalforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------------------
  # One-off / manual worker services
  # Not started by default. Run individually with:
  #   docker compose --profile tools run --rm lead_scraper
  # -----------------------------------------------------------------------
  lead_scraper:
    profiles: ["tools"]
    build:
      context: ./services/lead_scraper
    container_name: signalforge-lead-scraper
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  lead_enricher:
    profiles: ["tools"]
    build:
      context: ./services/lead_enricher
    container_name: signalforge-lead-enricher
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  social_processor:
    profiles: ["tools"]
    build:
      context: ./services/social_processor
    container_name: signalforge-social-processor
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  post_generator:
    profiles: ["tools"]
    build:
      context: ./services/post_generator
    container_name: signalforge-post-generator
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: signalforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
      - render-output:/tmp/signalforge_renders
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: signalforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: signalforge-worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
      - render-output:/tmp/signalforge_renders
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  comfyui:
    image: python:3.11-slim
    container_name: signalforge-comfyui
    profiles: ["comfyui"]
    restart: unless-stopped
    ports:
      - "8188:8188"
    command:
      - sh
      - -c
      - |
        pip install -q fastapi uvicorn
        python - <<'PYEOF'
        import uvicorn, uuid, struct, zlib
        from fastapi import FastAPI, Request
        from fastapi.responses import Response

        app = FastAPI()
        _store = {}    # prompt_id -> filename
        _images = {}   # filename  -> png bytes

        def _make_png(w=64, h=64, r=30, g=27, b=75):
            """Generate a minimal valid RGB PNG in pure Python (no Pillow needed)."""
            def chunk(name, data):
                crc = zlib.crc32(name + data) & 0xffffffff
                return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
            ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
            raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
            return (b'\x89PNG\r\n\x1a\n'
                    + chunk(b'IHDR', ihdr)
                    + chunk(b'IDAT', zlib.compress(raw))
                    + chunk(b'IEND', b''))

        @app.get('/system_stats')
        def system_stats():
            return {'cuda': False, 'devices': [{'name': 'stub-cpu', 'type': 'cpu', 'vram_total': 0}]}

        @app.post('/prompt')
        async def run_prompt(request: Request):
            pid = str(uuid.uuid4())
            fname = f'ComfyUI_{pid[:8]}_00001_.png'
            _images[fname] = _make_png()
            _store[pid] = fname
            return {'prompt_id': pid, 'number': 1, 'node_errors': {}}

        @app.get('/history/{prompt_id}')
        def history(prompt_id: str):
            fname = _store.get(prompt_id)
            if not fname:
                return {}
            return {prompt_id: {
                'outputs': {'7': {'images': [{'filename': fname, 'subfolder': '', 'type': 'output'}]}},
                'status': {'completed': True, 'status_str': 'success', 'messages': []}
            }}

        @app.get('/view')
        def view(filename: str = '', subfolder: str = '', type: str = 'output'):
            data = _images.get(filename, _make_png())
            return Response(content=data, media_type='image/png')

        uvicorn.run(app, host='0.0.0.0', port=8188)
        PYEOF
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./services/web
    container_name: signalforge-web
    restart: unless-stopped
    ports:
      - "5174:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_started

volumes:
  mongo-data:
  render-output:
