x-signalforge-env: &signalforge-env
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  GPT_AGENT_ENABLED: ${GPT_AGENT_ENABLED:-false}
  MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/signalforge}
  LINKEDIN_COOKIE: ${LINKEDIN_COOKIE:-}
  X_API_KEY: ${X_API_KEY:-}
  APIFY_TOKEN: ${APIFY_TOKEN:-}
  SERPAPI_KEY: ${SERPAPI_KEY:-}
  SIGNALFORGE_ENV: ${SIGNALFORGE_ENV:-local}
  VAULT_PATH: /vault
  PYTHONPATH: /app
  # Social Creative Engine v2 — ComfyUI integration (disabled by default)
  COMFYUI_ENABLED: ${COMFYUI_ENABLED:-false}
  COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://comfyui:8188}
  COMFYUI_WORKFLOW_PATH: ${COMFYUI_WORKFLOW_PATH:-}
  # Social Creative Engine v5.5 — FFmpeg render pipeline (enabled by default)
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  FFMPEG_ENABLED: ${FFMPEG_ENABLED:-true}
  FFMPEG_OUTPUT_DIR: ${FFMPEG_OUTPUT_DIR:-/tmp/signalforge_renders}
  # E2E testing — lower snippet score threshold (restore to 6 after E2E)
  SNIPPET_SCORE_THRESHOLD: ${SNIPPET_SCORE_THRESHOLD:-6}
  # v10.4 — Media Ingestion Layer
  YTDLP_ENABLED: ${YTDLP_ENABLED:-false}
  YTDLP_OUTPUT_DIR: ${YTDLP_OUTPUT_DIR:-/tmp/signalforge_downloads}
  YTDLP_MAX_DURATION_SECONDS: ${YTDLP_MAX_DURATION_SECONDS:-7200}
  YTDLP_ALLOWED_DOMAINS: ${YTDLP_ALLOWED_DOMAINS:-youtube.com,youtu.be}
  # v10.5 — Whisper local transcription (no external calls)
  TRANSCRIPT_PROVIDER: ${TRANSCRIPT_PROVIDER:-stub}
  TRANSCRIPT_LIVE_ENABLED: ${TRANSCRIPT_LIVE_ENABLED:-false}
  WHISPER_MODEL: ${WHISPER_MODEL:-base}
  AUTO_SCORE_SNIPPETS: ${AUTO_SCORE_SNIPPETS:-false}

services:
  mongo:
    image: mongo:8.2.7
    container_name: signalforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------------------
  # One-off / manual worker services
  # Not started by default. Run individually with:
  #   docker compose --profile tools run --rm lead_scraper
  # -----------------------------------------------------------------------
  lead_scraper:
    profiles: ["tools"]
    build:
      context: ./services/lead_scraper
    container_name: signalforge-lead-scraper
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  lead_enricher:
    profiles: ["tools"]
    build:
      context: ./services/lead_enricher
    container_name: signalforge-lead-enricher
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  social_processor:
    profiles: ["tools"]
    build:
      context: ./services/social_processor
    container_name: signalforge-social-processor
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  post_generator:
    profiles: ["tools"]
    build:
      context: ./services/post_generator
    container_name: signalforge-post-generator
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: signalforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
      - render-output:/tmp/signalforge_renders
      - ytdlp-downloads:/tmp/signalforge_downloads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: signalforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: signalforge-worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
      - render-output:/tmp/signalforge_renders
      - ytdlp-downloads:/tmp/signalforge_downloads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  comfyui:
    image: python:3.11-slim
    container_name: signalforge-comfyui
    profiles: ["comfyui"]
    restart: unless-stopped
    ports:
      - "8188:8188"
    command:
      - sh
      - -c
      - |
        pip install -q fastapi uvicorn Pillow
        python - <<'PYEOF'
        import uvicorn, uuid, io, hashlib, textwrap, math
        from fastapi import FastAPI, Request
        from fastapi.responses import Response
        from PIL import Image, ImageDraw, ImageFont

        app = FastAPI()
        _store = {}    # prompt_id -> filename
        _images = {}   # filename  -> png bytes

        # Cinematic colour palettes (dark, faceless, no identifiable faces)
        _PALETTES = [
            ((10, 8, 30), (40, 25, 80)),    # deep indigo
            ((8, 20, 12), (20, 60, 30)),    # forest deep
            ((30, 12, 5), (80, 35, 10)),    # ember/sunset
            ((5, 20, 35), (10, 50, 80)),    # ocean deep
            ((25, 8, 25), (70, 20, 60)),    # violet dusk
            ((5, 25, 25), (10, 65, 55)),    # teal dark
        ]

        def _lerp_color(c1, c2, t):
            return tuple(int(a + (b - a) * t) for a, b in zip(c1, c2))

        def _make_cinematic_png(prompt_text: str, palette_idx: int = 0, w: int = 1080, h: int = 1920) -> bytes:
            """
            Generate a 1080x1920 cinematic gradient PNG with scene text.
            Uses Pillow. No faces, no identifiable people.
            """
            dark, light = _PALETTES[palette_idx % len(_PALETTES)]
            img = Image.new('RGB', (w, h))
            draw = ImageDraw.Draw(img)

            # Vertical gradient background
            for y in range(h):
                t = y / h
                # add subtle vignette: brightest near center, darkest at edges
                vignette = 1.0 - 0.4 * abs(2 * t - 1)
                c = _lerp_color(dark, light, t * 0.6)
                c = tuple(min(255, int(v * vignette)) for v in c)
                draw.line([(0, y), (w, y)], fill=c)

            # Subtle diagonal light ray from top-left
            for i in range(0, w + h, 3):
                alpha = max(0, 40 - abs(i - w // 3) // 8)
                if alpha > 0:
                    x1 = max(0, i - h)
                    y1 = max(0, h - i)
                    x2 = min(w, i)
                    y2 = max(0, 0 - (i - w))
                    draw.line([(x1, 0), (0, y1)], fill=tuple(min(255, v + alpha) for v in _lerp_color(dark, light, 0.8)), width=1)

            # Horizontal divider lines (cinematic letterbox feel)
            bar_h = int(h * 0.08)
            draw.rectangle([(0, 0), (w, bar_h)], fill=tuple(max(0, v - 10) for v in dark))
            draw.rectangle([(0, h - bar_h), (w, h)], fill=tuple(max(0, v - 10) for v in dark))

            # SignalForge watermark (small, top-left inside bar)
            try:
                font_sm = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf", 24)
                font_md = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 38)
            except Exception:
                font_sm = ImageFont.load_default()
                font_md = font_sm

            draw.text((40, 18), "SIGNALFORGE  ·  PREVIEW", font=font_sm, fill=(200, 200, 200, 180))

            # Scene label (beat description) — wrapped, centered, lower-middle
            label = prompt_text[:120].strip()
            if len(prompt_text) > 120:
                label += "…"
            lines = textwrap.wrap(label, width=28)
            line_h = 48
            block_h = len(lines) * line_h + 24
            text_y = int(h * 0.62)
            # semi-transparent box
            pad = 30
            box_w = w - 120
            box_x = 60
            overlay = Image.new('RGBA', img.size, (0, 0, 0, 0))
            od = ImageDraw.Draw(overlay)
            od.rectangle(
                [(box_x - pad, text_y - pad), (box_x + box_w + pad, text_y + block_h + pad)],
                fill=(0, 0, 0, 140)
            )
            img = Image.alpha_composite(img.convert('RGBA'), overlay).convert('RGB')
            draw = ImageDraw.Draw(img)

            for i, line in enumerate(lines):
                bbox = draw.textbbox((0, 0), line, font=font_md)
                lw = bbox[2] - bbox[0]
                draw.text(((w - lw) // 2, text_y + i * line_h), line, font=font_md, fill=(240, 230, 210))

            # Subtle grain texture overlay
            import random
            rng = random.Random(hashlib.md5(prompt_text.encode()).hexdigest())
            pixels = img.load()
            for _ in range(w * h // 80):
                gx = rng.randint(0, w - 1)
                gy = rng.randint(0, h - 1)
                gr = rng.randint(-12, 12)
                r2, g2, b2 = pixels[gx, gy]
                pixels[gx, gy] = (
                    max(0, min(255, r2 + gr)),
                    max(0, min(255, g2 + gr)),
                    max(0, min(255, b2 + gr)),
                )

            buf = io.BytesIO()
            img.save(buf, format='PNG', optimize=False)
            return buf.getvalue()

        def _extract_prompt_text(workflow: dict) -> str:
            """Extract positive prompt text from ComfyUI API-format workflow."""
            for node_id, node in workflow.items():
                if node.get('class_type') == 'CLIPTextEncode':
                    text = node.get('inputs', {}).get('text', '')
                    if text and 'nsfw' not in text.lower() and 'negative' not in text.lower():
                        return text
            return 'cinematic B-roll, faceless, no identifiable people'

        def _palette_for_text(text: str) -> int:
            return int(hashlib.md5(text.encode()).hexdigest(), 16) % len(_PALETTES)

        @app.get('/system_stats')
        def system_stats():
            return {'cuda': False, 'devices': [{'name': 'stub-cpu-pillow', 'type': 'cpu', 'vram_total': 0}]}

        @app.post('/prompt')
        async def run_prompt(request: Request):
            body = await request.json()
            workflow = body.get('prompt', {})
            prompt_text = _extract_prompt_text(workflow)
            palette = _palette_for_text(prompt_text)
            pid = str(uuid.uuid4())
            fname = f'ComfyUI_{pid[:8]}_00001_.png'
            _images[fname] = _make_cinematic_png(prompt_text, palette)
            _store[pid] = fname
            return {'prompt_id': pid, 'number': 1, 'node_errors': {}}

        @app.get('/history/{prompt_id}')
        def history(prompt_id: str):
            fname = _store.get(prompt_id)
            if not fname:
                return {}
            return {prompt_id: {
                'outputs': {'7': {'images': [{'filename': fname, 'subfolder': '', 'type': 'output'}]}},
                'status': {'completed': True, 'status_str': 'success', 'messages': []}
            }}

        @app.get('/view')
        def view(filename: str = '', subfolder: str = '', type: str = 'output'):
            data = _images.get(filename, _make_cinematic_png('fallback', 0))
            return Response(content=data, media_type='image/png')

        uvicorn.run(app, host='0.0.0.0', port=8188)
        PYEOF
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./services/web
    container_name: signalforge-web
    restart: unless-stopped
    ports:
      - "5174:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_started

volumes:
  mongo-data:
  render-output:
  ytdlp-downloads:
