x-signalforge-env: &signalforge-env
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  GPT_AGENT_ENABLED: ${GPT_AGENT_ENABLED:-false}
  MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/signalforge}
  LINKEDIN_COOKIE: ${LINKEDIN_COOKIE:-}
  X_API_KEY: ${X_API_KEY:-}
  APIFY_TOKEN: ${APIFY_TOKEN:-}
  SERPAPI_KEY: ${SERPAPI_KEY:-}
  SIGNALFORGE_ENV: ${SIGNALFORGE_ENV:-local}
  VAULT_PATH: /vault
  PYTHONPATH: /app
  # Social Creative Engine v2 — ComfyUI integration (disabled by default)
  COMFYUI_ENABLED: ${COMFYUI_ENABLED:-false}
  COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://comfyui:8188}
  COMFYUI_WORKFLOW_PATH: ${COMFYUI_WORKFLOW_PATH:-}
  # Social Creative Engine v5.5 — FFmpeg render pipeline (enabled by default)
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  FFMPEG_ENABLED: ${FFMPEG_ENABLED:-true}
  FFMPEG_OUTPUT_DIR: ${FFMPEG_OUTPUT_DIR:-/tmp/signalforge_renders}

services:
  mongo:
    image: mongo:8.2.7
    container_name: signalforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------------------
  # One-off / manual worker services
  # Not started by default. Run individually with:
  #   docker compose --profile tools run --rm lead_scraper
  # -----------------------------------------------------------------------
  lead_scraper:
    profiles: ["tools"]
    build:
      context: ./services/lead_scraper
    container_name: signalforge-lead-scraper
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  lead_enricher:
    profiles: ["tools"]
    build:
      context: ./services/lead_enricher
    container_name: signalforge-lead-enricher
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  social_processor:
    profiles: ["tools"]
    build:
      context: ./services/social_processor
    container_name: signalforge-social-processor
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  post_generator:
    profiles: ["tools"]
    build:
      context: ./services/post_generator
    container_name: signalforge-post-generator
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
    depends_on:
      mongo:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: signalforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
      - render-output:/tmp/signalforge_renders
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: signalforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: signalforge-worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file:
      - .env.example
    environment: *signalforge-env
    volumes:
      - ./vault:/vault
      - ./data:/data
      - render-output:/tmp/signalforge_renders
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  comfyui:
    image: python:3.11-slim
    container_name: signalforge-comfyui
    profiles: ["comfyui"]
    restart: unless-stopped
    ports:
      - "8188:8188"
    command:
      - sh
      - -c
      - |
        pip install -q fastapi uvicorn
        python - <<'PYEOF'
        import uvicorn
        from fastapi import FastAPI
        import uuid, time
        app = FastAPI()

        @app.get('/system_stats')
        def system_stats():
            return {'cuda': False, 'devices': [{'name': 'stub-cpu', 'type': 'cpu', 'vram_total': 0}]}

        @app.post('/prompt')
        def run_prompt(body: dict = None):
            time.sleep(0.1)
            return {'prompt_id': str(uuid.uuid4()), 'number': 1, 'node_errors': {}}

        @app.get('/history/{prompt_id}')
        def history(prompt_id: str):
            return {prompt_id: {'outputs': {}, 'status': {'completed': True}}}

        uvicorn.run(app, host='0.0.0.0', port=8188)
        PYEOF
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8188/system_stats')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./services/web
    container_name: signalforge-web
    restart: unless-stopped
    ports:
      - "5174:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_started

volumes:
  mongo-data:
  render-output:
